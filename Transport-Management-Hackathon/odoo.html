<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TransitOps — Smart Transport Operations Platform</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root { color-scheme: dark; }
  html, body { background: #000; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Helvetica, Arial, sans-serif;
    background:
      radial-gradient(1100px 620px at 12% -8%, rgba(10,132,255,0.14), transparent 60%),
      radial-gradient(900px 560px at 100% 0%, rgba(191,90,242,0.10), transparent 55%),
      #050505;
    background-attachment: fixed;
    -webkit-font-smoothing: antialiased;
  }
  .to-display { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; letter-spacing: -0.015em; }
  .to-mono { font-family: ui-monospace, 'SF Mono', 'Menlo', 'Cascadia Code', monospace; }
  * { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.18) transparent; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.16); border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.28); }
  ::selection { background: rgba(10,132,255,0.35); }
  input[type=date]::-webkit-calendar-picker-indicator { cursor: pointer; filter: invert(1) brightness(1.6); }
  input, select { background: rgba(255,255,255,0.04); color: #fff; }
  select option { background: #1c1c1e; color: #fff; }
  input::placeholder { color: rgba(255,255,255,0.28); }
  button { -webkit-tap-highlight-color: transparent; }
  .glass-card { transition: border-color .2s ease, background-color .2s ease, transform .15s ease; }
  .glass-card:hover { border-color: rgba(255,255,255,0.16); transform: translateY(-1px); }
  .to-mono, .to-display { font-variant-numeric: tabular-nums; }
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .content-fade { animation: fadeInUp .35s cubic-bezier(.16,1,.3,1); }
  @keyframes float { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(20px,-24px); } }
  @keyframes modalIn { from { opacity: 0; transform: scale(.96) translateY(4px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  @keyframes backdropIn { from { opacity: 0; } to { opacity: 1; } }
  .modal-backdrop { background: rgba(0,0,0,0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); animation: backdropIn .18s ease; }
  .modal-card { animation: modalIn .22s cubic-bezier(.16,1,.3,1); }

  #bg-dots { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
  #root { position: relative; z-index: 1; }
  .dot {
    position: absolute;
    bottom: -5vh;
    left: var(--x);
    width: var(--s);
    height: var(--s);
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff8e7, #f3e3bd 55%, rgba(243,227,189,0) 75%);
    opacity: 0;
    animation: riseUp var(--dur) linear var(--delay) infinite;
    will-change: transform, opacity;
  }
  @keyframes riseUp {
    0%   { transform: translate(0, 0); opacity: 0; }
    8%   { opacity: var(--op); }
    88%  { opacity: var(--op); }
    100% { transform: translate(var(--drift), -112vh); opacity: 0; }
  }
</style>
</head>
<body>
<div id="bg-dots"></div>
<div id="root"></div>

<script>
(function seedDots() {
  const layer = document.getElementById("bg-dots");
  const COUNT = 46;
  let html = "";
  for (let i = 0; i < COUNT; i++) {
    const x = Math.random() * 100;
    const s = (Math.random() * 3.5 + 1.5).toFixed(1);
    const dur = (Math.random() * 14 + 16).toFixed(1);
    const delay = (Math.random() * -30).toFixed(1);
    const drift = (Math.random() * 80 - 40).toFixed(0);
    const op = (Math.random() * 0.35 + 0.25).toFixed(2);
    html += '<span class="dot" style="--x:' + x + '%; --s:' + s + 'px; --dur:' + dur + 's; --delay:' + delay + 's; --drift:' + drift + 'px; --op:' + op + ';"></span>';
  }
  layer.innerHTML = html;
})();
</script>

<script>
// ===========================================================================
// TransitOps — self-contained vanilla JS build (no bundler / no framework)
// ===========================================================================

const TODAY = new Date("2026-07-12");

const ROLES = ["Fleet Manager", "Driver", "Safety Officer", "Financial Analyst"];
const ROLE_ICON = { "Fleet Manager": "truck", "Driver": "route", "Safety Officer": "shield", "Financial Analyst": "bar-chart" };

const PERMS = {
  "Fleet Manager":     { vehicles: "write", drivers: "read",  trips: "read",  maintenance: "write", fuel: "read",  reports: "read"  },
  "Driver":            { vehicles: "read",  drivers: "read",  trips: "write", maintenance: "read",  fuel: "write", reports: "read"  },
  "Safety Officer":    { vehicles: "read",  drivers: "write", trips: "read",  maintenance: "read",  fuel: "read",  reports: "read"  },
  "Financial Analyst": { vehicles: "read",  drivers: "read",  trips: "read",  maintenance: "read",  fuel: "write", reports: "write" },
};

const NAV = [
  { key: "dashboard",   label: "Dashboard",        icon: "compass", area: null },
  { key: "vehicles",    label: "Vehicles",         icon: "truck", area: "vehicles" },

// ---------------------------------------------------------------------------

// ---------------------------------------------------------------------------
const ICONS = {
  compass: '<circle cx="12" cy="12" r="9"/><polygon points="15.5,8.5 13,13 8.5,15.5 11,11"/>',
  truck: '<rect x="1.5" y="7" width="12.5" height="9" rx="1"/><path d="M14 10.2h3.6L21 13.5V16h-7"/><circle cx="6" cy="18.3" r="1.7"/><circle cx="16.3" cy="18.3" r="1.7"/>',
  users: '<circle cx="9" cy="8" r="3.1"/><path d="M3.3 19c0-3.4 2.7-5.8 5.7-5.8s5.7 2.4 5.7 5.8"/><circle cx="17.2" cy="8.8" r="2.5"/><path d="M16 13.3c2.1.5 3.9 2.5 3.9 5.7"/>',
  route: '<circle cx="6" cy="19" r="2.1"/><circle cx="18" cy="5" r="2.1"/><path d="M6 16.9V13a4 4 0 0 1 4-4h4a4 4 0 0 0 4-4"/>',
  wrench: '<path d="M14.5 6.2a3.9 3.9 0 1 0-5.3 5.3L3.6 17.1l3.3 3.3 5.6-5.6a3.9 3.9 0 0 0 5.3-5.3l-2.5 2.5-2.1-.6-.6-2.1z"/>',
  droplet: '<path d="M12 3.3s6.2 6.7 6.2 10.9a6.2 6.2 0 1 1-12.4 0C5.8 10 12 3.3 12 3.3z"/>',
  "bar-chart": '<path d="M4.5 20V11M12 20V4M19.5 20v-7"/>',
  shield: '<path d="M12 3.2 19 6v5.5c0 4.7-3 7.9-7 9.3-4-1.4-7-4.6-7-9.3V6l7-2.8z"/>',
  "log-out": '<path d="M9.5 21H5.3a1.8 1.8 0 0 1-1.8-1.8V4.8A1.8 1.8 0 0 1 5.3 3H9.5"/><path d="M16 16.5 20.5 12 16 7.5"/><path d="M20.5 12H9.5"/>',
  search: '<circle cx="11" cy="11" r="7"/><path d="M21 21 16.6 16.6"/>',
  plus: '<path d="M12 5v14M5 12h14"/>',
  x: '<path d="M6 6l12 12M18 6 6 18"/>',
  "check-circle": '<circle cx="12" cy="12" r="9"/><path d="M8 12.3 10.8 15 16 9.3"/>',
  "alert-triangle": '<path d="M12 3.6 21 19.5H3L12 3.6z"/><path d="M12 9.8v3.8"/><circle cx="12" cy="16.4" r=".15" fill="currentColor" stroke="none"/>',
  funnel: '<path d="M4 5h16l-6 7.3V18l-4 2v-7.7L4 5z"/>',
  download: '<path d="M12 3.5v11.5"/><path d="M7.3 10.8 12 15.5l4.7-4.7"/><path d="M5 20.5h14"/>',
  "chevron-right": '<path d="M9 6l6 6-6 6"/>',
  "map-pin": '<path d="M12 21s7-6.7 7-11.3a7 7 0 1 0-14 0C5 14.3 12 21 12 21z"/><circle cx="12" cy="9.7" r="2.3"/>',
};
function icon(name, cls) {
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" class="' + (cls || "w-4 h-4") + '">' + (ICONS[name] || "") + '</svg>';
}

const STATUS_COLORS = {
  Available: "bg-emerald-500/10 text-emerald-400 border-emerald-500/20",
  "On Trip": "bg-amber-500/10 text-amber-400 border-amber-500/20",
  "In Shop": "bg-amber-500/10 text-amber-400 border-amber-500/20",
  Retired: "bg-white/5 text-zinc-500 border-white/10",
  "Off Duty": "bg-white/5 text-zinc-500 border-white/10",
  Suspended: "bg-red-500/10 text-red-400 border-red-500/20",
  Draft: "bg-white/5 text-zinc-400 border-white/10",
  Dispatched: "bg-blue-500/10 text-blue-400 border-blue-500/20",
  Completed: "bg-emerald-500/10 text-emerald-400 border-emerald-500/20",
  Cancelled: "bg-red-500/10 text-red-400 border-red-500/20",
  Open: "bg-amber-500/10 text-amber-400 border-amber-500/20",
  Closed: "bg-emerald-500/10 text-emerald-400 border-emerald-500/20",
};

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
const state = {
  user: null,
  loginRole: "Fleet Manager",
  loginEmail: "",
  loginPassword: "",
  loginError: "",
  tab: "dashboard",
  modal: null, // string key
  completingTripId: null,
  toast: null,
  dashFilters: { type: "All", status: "All", region: "All" },
  vehicleSearch: "",

  vehicles: [
    { id: "VH-1001", reg: "TS-09-AB-4471", name: "Van-05", type: "Van", region: "North", maxLoad: 500, odometer: 12500, cost: 1800000, status: "Available" },
    { id: "VH-1002", reg: "TS-07-CD-8821", name: "Truck-12", type: "Truck", region: "South", maxLoad: 5000, odometer: 45210, cost: 4200000, status: "On Trip" },
    { id: "VH-1003", reg: "TS-11-EF-2290", name: "Bike-03", type: "Bike", region: "East", maxLoad: 30, odometer: 8900, cost: 120000, status: "In Shop" },
    { id: "VH-1004", reg: "TS-02-GH-6634", name: "Trailer-07", type: "Trailer", region: "West", maxLoad: 12000, odometer: 102300, cost: 6500000, status: "Retired" },
  ],
  drivers: [
    { id: "DR-01", name: "Alex", license: "DL-88213", category: "LMV", expiry: "2027-03-15", contact: "+91 90000 11111", safety: 92, status: "Available" },
    { id: "DR-02", name: "Priya", license: "DL-77410", category: "HMV", expiry: "2026-01-01", contact: "+91 90000 22222", safety: 78, status: "Available" },
    { id: "DR-03", name: "Ramesh", license: "DL-55210", category: "HMV", expiry: "2027-11-20", contact: "+91 90000 33333", safety: 65, status: "On Trip" },
    { id: "DR-04", name: "Fatima", license: "DL-90011", category: "LMV", expiry: "2027-06-01", contact: "+91 90000 44444", safety: 88, status: "Suspended" },
  ],
  trips: [
    { id: "TR-01", source: "Hyderabad", destination: "Warangal", vehicleId: "VH-1001", driverId: "DR-01", cargo: 450, distance: 140, status: "Completed", revenue: 8000, finalOdometer: 12640, fuelUsed: 18 },
    { id: "TR-02", source: "Chennai", destination: "Bengaluru", vehicleId: "VH-1002", driverId: "DR-03", cargo: 3500, distance: 350, status: "Dispatched", revenue: 21000, finalOdometer: null, fuelUsed: null },
  ],
  maintenance: [
    { id: "MT-01", vehicleId: "VH-1003", type: "Oil Change", cost: 1200, date: "2026-07-08", status: "Open" },
    { id: "MT-02", vehicleId: "VH-1001", type: "Tire Replacement", cost: 3500, date: "2026-06-02", status: "Closed" },
  ],
  fuelLogs: [
    { id: "FL-01", vehicleId: "VH-1001", liters: 18, cost: 1980, date: "2026-07-01" },
    { id: "FL-02", vehicleId: "VH-1002", liters: 60, cost: 6600, date: "2026-07-05" },
  ],
  expenses: [
    { id: "EX-01", vehicleId: "VH-1002", category: "Toll", amount: 450, date: "2026-07-05" },
    { id: "EX-02", vehicleId: "VH-1001", category: "Toll", amount: 120, date: "2026-07-01" },
  ],
};

let toastTimer = null;
function notify(msg, kind) {
  state.toast = { msg, kind: kind || "ok" };
  render();
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { state.toast = null; render(); }, 3000);
}

function uid(prefix, arr) {
  return prefix + "-" + String(arr.length + 1).padStart(2, "0") + "-" + Math.floor(Math.random() * 900 + 100);
}
function vehicleById(id) { return state.vehicles.find(v => v.id === id); }
function driverById(id) { return state.drivers.find(d => d.id === id); }
function money(n) { return "₹" + Number(n || 0).toLocaleString("en-IN"); }
function isLicenseExpired(d) { return new Date(d.expiry) < TODAY; }
function esc(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }
function val(id) { const el = document.getElementById(id); return el ? el.value : ""; }

// ===========================================================================
// AUTH
// ===========================================================================
function selectLoginRole(role) {
  // Preserve whatever the person has already typed before re-rendering the card grid.
  state.loginEmail = val("login-email");
  state.loginPassword = val("login-password");
  state.loginRole = role;
  render();
  const pwEl = document.getElementById("login-password");
  if (pwEl) pwEl.focus();
}
function updateLoginEmail(v) { state.loginEmail = v; }
function updateLoginPassword(v) { state.loginPassword = v; }

function submitLogin() {
  const email = val("login-email") || state.loginEmail;
  const password = val("login-password") || state.loginPassword;
  if (!email.includes("@") || password.length < 4) {
    state.loginEmail = email;
    state.loginPassword = password;
    state.loginError = "Enter a valid email and a password of at least 4 characters.";
    render();
    return;
  }
  state.loginError = "";
  state.user = { email, role: state.loginRole };
  state.loginEmail = ""; state.loginPassword = "";
  state.tab = "dashboard";
  render();
  notify("Signed in as " + state.user.role);
}

function signOut() {
  state.user = null;
  render();
}

function can(area) { return state.user && PERMS[state.user.role][area] === "write"; }

// ===========================================================================
// NAV / MODAL
// ===========================================================================
function setTab(tab) { state.tab = tab; render(); }
function openModal(key) { state.modal = key; render(); }
function closeModal() { state.modal = null; state.completingTripId = null; render(); }

// ===========================================================================
// VEHICLE actions
// ===========================================================================
function submitVehicleForm() {
  const reg = val("v-reg").trim(), name = val("v-name").trim();
  const type = val("v-type"), region = val("v-region");
  const maxLoad = Number(val("v-maxload")), odometer = Number(val("v-odo")) || 0, cost = Number(val("v-cost"));
  if (!reg || !name || !maxLoad || !cost) { notify("Please fill in all required fields", "err"); return; }
  if (state.vehicles.some(v => v.reg.toLowerCase() === reg.toLowerCase())) { notify("Registration number must be unique", "err"); return; }
  state.vehicles.push({ id: uid("VH", state.vehicles), reg, name, type, region, maxLoad, odometer, cost, status: "Available" });
  notify("Vehicle registered");
  closeModal();
}
function retireVehicle(id) {
  const v = vehicleById(id); v.status = "Retired";
  notify("Vehicle retired");
  render();
}

// ===========================================================================
// DRIVER actions
// ===========================================================================
function submitDriverForm() {
  const name = val("d-name").trim(), license = val("d-license").trim();
  const category = val("d-category"), expiry = val("d-expiry"), contact = val("d-contact");
  const safety = Number(val("d-safety")) || 0;
  if (!name || !license || !expiry) { notify("Please fill in all required fields", "err"); return; }
  state.drivers.push({ id: uid("DR", state.drivers), name, license, category, expiry, contact, safety, status: "Available" });
  notify("Driver added");
  closeModal();
}
function suspendDriver(id) { driverById(id).status = "Suspended"; notify("Driver suspended", "err"); render(); }
function reinstateDriver(id) { driverById(id).status = "Available"; notify("Driver reinstated"); render(); }

// ===========================================================================
// TRIP lifecycle
// ===========================================================================
function submitTripForm() {
  const source = val("t-source").trim(), destination = val("t-destination").trim();
  const vehicleId = val("t-vehicle"), driverId = val("t-driver");
  const cargo = Number(val("t-cargo")), distance = Number(val("t-distance")) || 0;
  if (!source || !destination || !vehicleId || !driverId || !cargo) { notify("Please fill in all required fields", "err"); return; }

  const vehicle = vehicleById(vehicleId), driver = driverById(driverId);
  if (!vehicle || vehicle.status !== "Available") { notify("Vehicle is not available", "err"); return; }
  if (!driver || driver.status !== "Available") { notify("Driver is not available", "err"); return; }
  if (isLicenseExpired(driver)) { notify("Driver's license has expired", "err"); return; }
  if (cargo > vehicle.maxLoad) { notify("Cargo exceeds " + vehicle.name + "'s max load (" + vehicle.maxLoad + "kg)", "err"); return; }

  state.trips.push({ id: uid("TR", state.trips), source, destination, vehicleId, driverId, cargo, distance, status: "Draft", revenue: 0, finalOdometer: null, fuelUsed: null });
  notify("Trip created as Draft");
  closeModal();
}

function dispatchTrip(id) {
  const t = state.trips.find(x => x.id === id);
  const vehicle = vehicleById(t.vehicleId), driver = driverById(t.driverId);
  if (vehicle.status !== "Available") { notify("Vehicle no longer available", "err"); return; }
  if (driver.status !== "Available" || isLicenseExpired(driver)) { notify("Driver no longer eligible", "err"); return; }
  t.status = "Dispatched"; vehicle.status = "On Trip"; driver.status = "On Trip";
  notify("Trip dispatched");
  render();
}

function openCompleteModal(id) {
  state.completingTripId = id;
  state.modal = "completeTrip";
  render();
}

function submitCompleteTrip() {
  const t = state.trips.find(x => x.id === state.completingTripId);
  const vehicle = vehicleById(t.vehicleId), driver = driverById(t.driverId);
  const finalOdometer = Number(val("c-odo")), fuelUsed = Number(val("c-fuel")) || 0, revenue = Number(val("c-revenue")) || 0;

  t.status = "Completed"; t.finalOdometer = finalOdometer; t.fuelUsed = fuelUsed; t.revenue = revenue;
  vehicle.status = "Available"; driver.status = "Available";
  if (finalOdometer > vehicle.odometer) vehicle.odometer = finalOdometer;
  if (fuelUsed > 0) {
    state.fuelLogs.push({ id: uid("FL", state.fuelLogs), vehicleId: t.vehicleId, liters: fuelUsed, cost: Math.round(fuelUsed * 110), date: new Date().toISOString().slice(0, 10) });
  }
  notify("Trip completed");
  closeModal();
}

function cancelTrip(id) {
  const t = state.trips.find(x => x.id === id);
  if (t.status === "Dispatched") {
    vehicleById(t.vehicleId).status = "Available";
    driverById(t.driverId).status = "Available";
  }
  t.status = "Cancelled";
  notify("Trip cancelled", "err");
  render();
}

// ===========================================================================
// MAINTENANCE
// ===========================================================================
function submitMaintenanceForm() {
  const vehicleId = val("m-vehicle"), type = val("m-type"), cost = Number(val("m-cost")), date = val("m-date");
  if (!vehicleId || !cost) { notify("Please fill in all required fields", "err"); return; }
  state.maintenance.push({ id: uid("MT", state.maintenance), vehicleId, type, cost, date, status: "Open" });
  vehicleById(vehicleId).status = "In Shop";
  notify("Maintenance record opened — vehicle moved to In Shop");
  closeModal();
}
function closeMaintenance(id) {
  const m = state.maintenance.find(x => x.id === id);
  m.status = "Closed";
  const v = vehicleById(m.vehicleId);
  if (v.status !== "Retired") v.status = "Available";
  notify("Maintenance closed");
  render();
}

// ===========================================================================
// FUEL / EXPENSE
// ===========================================================================
function submitFuelForm() {
  const vehicleId = val("f-vehicle"), liters = Number(val("f-liters")), cost = Number(val("f-cost")), date = val("f-date");
  if (!vehicleId || !liters) { notify("Please fill in all required fields", "err"); return; }
  state.fuelLogs.push({ id: uid("FL", state.fuelLogs), vehicleId, liters, cost, date });
  notify("Fuel log recorded");
  closeModal();
}
function submitExpenseForm() {
  const vehicleId = val("e-vehicle"), category = val("e-category"), amount = Number(val("e-amount")), date = val("e-date");
  if (!vehicleId || !amount) { notify("Please fill in all required fields", "err"); return; }
  state.expenses.push({ id: uid("EX", state.expenses), vehicleId, category, amount, date });
  notify("Expense recorded");
  closeModal();
}

// ===========================================================================
// REPORTS + derived data
// ===========================================================================
function perVehicleReport() {
  return state.vehicles.map(v => {
    const vTrips = state.trips.filter(t => t.vehicleId === v.id && t.status === "Completed");
    const distance = vTrips.reduce((s, t) => s + (t.distance || 0), 0);
    const revenue = vTrips.reduce((s, t) => s + (t.revenue || 0), 0);
    const fuelL = state.fuelLogs.filter(f => f.vehicleId === v.id).reduce((s, f) => s + f.liters, 0);
    const fuelCost = state.fuelLogs.filter(f => f.vehicleId === v.id).reduce((s, f) => s + f.cost, 0);
    const maintCost = state.maintenance.filter(m => m.vehicleId === v.id).reduce((s, m) => s + m.cost, 0);
    const expCost = state.expenses.filter(e => e.vehicleId === v.id).reduce((s, e) => s + e.amount, 0);
    const opCost = fuelCost + maintCost + expCost;
    const efficiency = fuelL > 0 ? distance / fuelL : 0;
    const roi = v.cost > 0 ? (revenue - (maintCost + fuelCost)) / v.cost : 0;
    return Object.assign({}, v, { distance, revenue, fuelL, fuelCost, maintCost, expCost, opCost, efficiency, roi });
  });
}

function computeKpis() {
  const active = state.vehicles.filter(v => v.status !== "Retired");
  const available = state.vehicles.filter(v => v.status === "Available");
  const inShop = state.vehicles.filter(v => v.status === "In Shop");
  const onTrip = state.vehicles.filter(v => v.status === "On Trip");
  const activeTrips = state.trips.filter(t => t.status === "Dispatched").length;
  const pendingTrips = state.trips.filter(t => t.status === "Draft").length;
  const driversOnDuty = state.drivers.filter(d => d.status === "On Trip").length;
  const utilization = active.length ? Math.round((onTrip.length / active.length) * 100) : 0;
  return { active: active.length, available: available.length, inShop: inShop.length, activeTrips, pendingTrips, driversOnDuty, utilization };
}

function exportCsv() {
  const report = perVehicleReport();
  const rows = [
    ["Vehicle", "Distance (km)", "Fuel (L)", "Fuel Efficiency (km/L)", "Fuel Cost", "Maintenance Cost", "Other Expenses", "Operational Cost", "Revenue", "ROI (%)"],
  ].concat(report.map(r => [r.name, r.distance, r.fuelL, r.efficiency.toFixed(2), r.fuelCost, r.maintCost, r.expCost, r.opCost, r.revenue, (r.roi * 100).toFixed(1)]));
  const csv = rows.map(r => r.map(c => '"' + String(c == null ? "" : c).replace(/"/g, '""') + '"').join(",")).join("\n");
  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "transitops_report.csv"; a.click();
  URL.revokeObjectURL(url);
}

function routeStrip(status) {
  const stops = ["Draft", "Dispatched", "Completed"];
  const cancelled = status === "Cancelled";
  const activeIdx = stops.indexOf(status);
  let html = '<div class="flex items-center gap-0 w-full">';
  stops.forEach((s, i) => {
    const reached = !cancelled && i <= activeIdx;
    html += '<div class="flex flex-col items-center gap-1">' +
      '<div class="w-2.5 h-2.5 rounded-full border-2 ' + (cancelled ? "border-red-400/60 bg-red-500/20" : reached ? "border-blue-400 bg-blue-500" : "border-white/15 bg-transparent") + '"></div>' +
      '<span class="to-mono text-[10px] ' + (reached && !cancelled ? "text-blue-400" : "text-zinc-600") + '">' + s + '</span></div>';
    if (i < stops.length - 1) {
      html += '<div class="flex-1 h-0.5 mb-4 ' + (cancelled ? "bg-red-500/20" : (reached && i < activeIdx ? "bg-blue-500" : "bg-white/10")) + '"></div>';
    }
  });
  html += '</div>';
  if (cancelled) html += '<span class="to-mono text-[10px] text-red-500">cancelled en route</span>';
  return html;
}

      '<div class="flex items-start justify-between mb-3">' +
      '<div><div class="to-display font-semibold text-white">' + esc(t.source) + ' → ' + esc(t.destination) + '</div>' +
      '<div class="to-mono text-xs text-zinc-500 mt-0.5">' + t.id + ' · ' + (v ? v.name : "—") + ' · ' + (d ? d.name : "—") + ' · ' + t.cargo + 'kg / ' + t.distance + 'km</div></div>' +
      badge(t.status) + '</div>' + routeStrip(t.status) +
      (actions ? '<div class="flex gap-2 mt-3">' + actions + '</div>' : '') + '</div>';
  }).join("");

  return sectionHeader("Trip Management", "Dispatch, track and close out deliveries", can("trips") ? btn("+ Create Trip", "openModal('addTrip')") : "") +
    '<div class="space-y-3">' + cards + '</div>';
}

function addTripModal() {
  const availableVehicles = state.vehicles.filter(v => v.status === "Available");
  const availableDrivers = state.drivers.filter(d => d.status === "Available");
  const body = field("Source", '<input id="t-source" class="' + inputCls + '" />') +
    field("Destination", '<input id="t-destination" class="' + inputCls + '" />') +
    field("Vehicle (available only)", '<select id="t-vehicle" class="' + inputCls + '"><option value="">Select vehicle</option>' +
      availableVehicles.map(v => '<option value="' + v.id + '">' + v.name + ' — max ' + v.maxLoad + 'kg</option>').join("") + '</select>') +
    field("Driver (available only)", '<select id="t-driver" class="' + inputCls + '"><option value="">Select driver</option>' +
      availableDrivers.map(d => '<option value="' + d.id + '">' + d.name + ' — safety ' + d.safety + '</option>').join("") + '</select>') +
    field("Cargo Weight (kg)", '<input id="t-cargo" type="number" class="' + inputCls + '" />') +
    field("Planned Distance (km)", '<input id="t-distance" type="number" class="' + inputCls + '" />') +
    '<div class="flex justify-end gap-2 mt-4">' + btn("Cancel", "closeModal()", "ghost") + btn("Create Trip", "submitTripForm()") + '</div>';
  return modalWrap("Create Trip", body);
}

function completeTripModal() {
  const t = state.trips.find(x => x.id === state.completingTripId);
  const v = vehicleById(t.vehicleId);
  const body = field("Final Odometer (km)", '<input id="c-odo" type="number" class="' + inputCls + '" value="' + v.odometer + '" />') +
    field("Fuel Consumed (liters)", '<input id="c-fuel" type="number" class="' + inputCls + '" />') +
    field("Trip Revenue (₹)", '<input id="c-revenue" type="number" class="' + inputCls + '" value="' + (t.revenue || "") + '" />') +
    '<div class="flex justify-end gap-2 mt-4">' + btn("Cancel", "closeModal()", "ghost") + btn("Mark Completed", "submitCompleteTrip()", "emerald") + '</div>';
  return modalWrap("Complete " + t.id, body);
}

// ---- Maintenance ----
function maintenanceTemplate() {
  const rows = state.maintenance.map(m => '<tr class="border-b border-white/5 last:border-0 hover:bg-white/[0.04]">' +
    '<td class="px-4 py-2.5 font-medium text-zinc-100">' + (vehicleById(m.vehicleId) || {}).name + '</td>' +
    '<td class="px-4 py-2.5 text-zinc-400">' + m.type + '</td>' +
    '<td class="px-4 py-2.5 to-mono text-xs">' + money(m.cost) + '</td>' +
    '<td class="px-4 py-2.5 to-mono text-xs">' + m.date + '</td>' +
    '<td class="px-4 py-2.5">' + badge(m.status) + '</td>' +
    '<td class="px-4 py-2.5 text-right">' + (can("maintenance") && m.status === "Open" ? '<button onclick="closeMaintenance(\'' + m.id + '\')" class="text-xs text-emerald-400 hover:text-emerald-300 hover:underline">Close</button>' : '') + '</td>' +
    '</tr>').join("");

  return sectionHeader("Maintenance", "Vehicles in an open maintenance record are hidden from dispatch", can("maintenance") ? btn("+ New Record", "openModal('addMaintenance')") : "") +
    '<div class="glass-card bg-zinc-900/60 backdrop-blur-xl border border-white/10 rounded-2xl overflow-hidden"><table class="w-full text-sm">' +
    '<thead><tr class="bg-white/[0.03] to-mono text-xs text-zinc-500 border-b border-white/10">' +
    ["Vehicle", "Type", "Cost", "Date", "Status", ""].map(h => '<th class="text-left px-4 py-2 font-medium">' + h + '</th>').join("") +
    '</tr></thead><tbody>' + rows + '</tbody></table></div>';
}

function addMaintenanceModal() {
  const eligible = state.vehicles.filter(v => v.status !== "Retired");
  const body = field("Vehicle", '<select id="m-vehicle" class="' + inputCls + '"><option value="">Select vehicle</option>' +
      eligible.map(v => '<option value="' + v.id + '">' + v.name + ' (' + v.status + ')</option>').join("") + '</select>') +
    field("Type", '<select id="m-type" class="' + inputCls + '">' + ["Oil Change", "Tire Replacement", "Repair", "Inspection"].map(t => '<option>' + t + '</option>').join("") + '</select>') +
    field("Cost (₹)", '<input id="m-cost" type="number" class="' + inputCls + '" />') +
    field("Date", '<input id="m-date" type="date" class="' + inputCls + '" value="' + new Date().toISOString().slice(0, 10) + '" />') +
    '<div class="flex justify-end gap-2 mt-4">' + btn("Cancel", "closeModal()", "ghost") + btn("Open Record", "submitMaintenanceForm()") + '</div>';
  return modalWrap("New Maintenance Record", body);
}

// ---- Fuel & Expenses ----
function fuelTemplate() {
  const totals = state.vehicles.map(v => {
    const fuel = state.fuelLogs.filter(f => f.vehicleId === v.id).reduce((s, f) => s + f.cost, 0);
    const exp = state.expenses.filter(e => e.vehicleId === v.id).reduce((s, e) => s + e.amount, 0);
    return Object.assign({}, v, { fuel, exp, total: fuel + exp });
  });
  const totalRows = totals.map(v => '<tr class="border-b border-white/5 last:border-0 hover:bg-white/[0.04]">' +
    '<td class="px-4 py-2.5 font-medium text-zinc-100">' + v.name + '</td>' +
    '<td class="px-4 py-2.5 to-mono text-xs">' + money(v.fuel) + '</td>' +
    '<td class="px-4 py-2.5 to-mono text-xs">' + money(v.exp) + '</td>' +
    '<td class="px-4 py-2.5 to-mono text-xs font-medium">' + money(v.total) + '</td></tr>').join("");

  const fuelList = state.fuelLogs.map(f => '<div class="flex justify-between to-mono text-xs border-b border-white/5 pb-1"><span>' + (vehicleById(f.vehicleId) || {}).name + ' · ' + f.date + '</span><span>' + f.liters + 'L · ' + money(f.cost) + '</span></div>').join("");
  const expList = state.expenses.map(e => '<div class="flex justify-between to-mono text-xs border-b border-white/5 pb-1"><span>' + (vehicleById(e.vehicleId) || {}).name + ' · ' + e.category + ' · ' + e.date + '</span><span>' + money(e.amount) + '</span></div>').join("");

  const actions = can("fuel") ? '<div class="flex gap-2">' + btn("+ Expense", "openModal('addExpense')", "ghost") + btn("+ Fuel Log", "openModal('addFuel')") + '</div>' : "";

  return sectionHeader("Fuel & Expense Management", "Operational cost = Fuel + Maintenance, tracked per vehicle", actions) +
    '<div class="glass-card bg-zinc-900/60 backdrop-blur-xl border border-white/10 rounded-2xl overflow-hidden mb-6"><table class="w-full text-sm">' +
    '<thead><tr class="bg-white/[0.03] to-mono text-xs text-zinc-500 border-b border-white/10">' +
    ["Vehicle", "Fuel Spend", "Other Expenses", "Total"].map(h => '<th class="text-left px-4 py-2 font-medium">' + h + '</th>').join("") +
    '</tr></thead><tbody>' + totalRows + '</tbody></table></div>' +
    '<div class="grid grid-cols-2 gap-6">' +
    '<div class="glass-card bg-zinc-900/60 backdrop-blur-xl border border-white/10 rounded-2xl p-4"><h3 class="to-display text-sm font-semibold text-white mb-2">Fuel logs</h3><div class="space-y-1.5 max-h-56 overflow-y-auto">' + (fuelList || '<p class="text-xs text-zinc-600">No fuel logs yet.</p>') + '</div></div>' +
    '<div class="glass-card bg-zinc-900/60 backdrop-blur-xl border border-white/10 rounded-2xl p-4"><h3 class="to-display text-sm font-semibold text-white mb-2">Other expenses</h3><div class="space-y-1.5 max-h-56 overflow-y-auto">' + (expList || '<p class="text-xs text-zinc-600">No expenses yet.</p>') + '</div></div>' +
    '</div>';
}

function addFuelModal() {
  const body = field("Vehicle", '<select id="f-vehicle" class="' + inputCls + '"><option value="">Select vehicle</option>' + state.vehicles.map(v => '<option value="' + v.id + '">' + v.name + '</option>').join("") + '</select>') +
    field("Liters", '<input id="f-liters" type="number" class="' + inputCls + '" />') +
    field("Cost (₹)", '<input id="f-cost" type="number" class="' + inputCls + '" />') +
    field("Date", '<input id="f-date" type="date" class="' + inputCls + '" value="' + new Date().toISOString().slice(0, 10) + '" />') +
    '<div class="flex justify-end gap-2 mt-4">' + btn("Cancel", "closeModal()", "ghost") + btn("Save", "submitFuelForm()") + '</div>';
  return modalWrap("Record Fuel Log", body);
}
function addExpenseModal() {
  const body = field("Vehicle", '<select id="e-vehicle" class="' + inputCls + '"><option value="">Select vehicle</option>' + state.vehicles.map(v => '<option value="' + v.id + '">' + v.name + '</option>').join("") + '</select>') +
    field("Category", '<select id="e-category" class="' + inputCls + '">' + ["Toll", "Parking", "Fine", "Other"].map(c => '<option>' + c + '</option>').join("") + '</select>') +
    field("Amount (₹)", '<input id="e-amount" type="number" class="' + inputCls + '" />') +
    field("Date", '<input id="e-date" type="date" class="' + inputCls + '" value="' + new Date().toISOString().slice(0, 10) + '" />') +
    '<div class="flex justify-end gap-2 mt-4">' + btn("Cancel", "closeModal()", "ghost") + btn("Save", "submitExpenseForm()") + '</div>';
  return modalWrap("Record Expense", body);
}

// ---- Reports ----
function reportsTemplate() {
  const report = perVehicleReport();
  const rows = report.map(r => '<tr class="border-b border-white/5 last:border-0 hover:bg-white/[0.04]">' +
    '<td class="px-4 py-2.5 font-medium text-zinc-100">' + r.name + '</td>' +
    '<td class="px-4 py-2.5 to-mono text-xs">' + r.distance + ' km</td>' +
    '<td class="px-4 py-2.5 to-mono text-xs">' + (r.efficiency ? r.efficiency.toFixed(1) : "—") + ' km/L</td>' +
    '<td class="px-4 py-2.5 to-mono text-xs">' + money(r.opCost) + '</td>' +
    '<td class="px-4 py-2.5 to-mono text-xs">' + money(r.revenue) + '</td>' +
    '<td class="px-4 py-2.5 to-mono text-xs font-medium ' + (r.roi >= 0 ? "text-emerald-400" : "text-red-400") + '">' + (r.roi * 100).toFixed(1) + '%</td></tr>').join("");

  const maxCost = Math.max(1, ...report.map(r => r.opCost));
  const bars = report.map(r => '<div class="flex flex-col items-center gap-1.5 flex-1">' +
    '<div class="to-mono text-[10px] text-zinc-500">' + money(r.opCost) + '</div>' +
    '<div class="w-full bg-white/5 rounded-t-lg h-40 flex items-end overflow-hidden"><div class="w-full bg-gradient-to-t from-zinc-500 to-zinc-300 rounded-t-lg" style="height:' + Math.max((r.opCost / maxCost) * 100, 3) + '%"></div></div>' +
    '<div class="to-mono text-xs text-zinc-400">' + r.name + '</div></div>').join("");

  return sectionHeader("Reports & Analytics", "Fuel efficiency, utilization, cost and ROI by vehicle", can("reports") ? btn('<span class="inline-flex items-center gap-1.5">' + icon("download", "w-3.5 h-3.5") + 'Export CSV</span>', "exportCsv()", "ghost") : "") +
    '<div class="glass-card bg-zinc-900/60 backdrop-blur-xl border border-white/10 rounded-2xl overflow-hidden mb-6"><table class="w-full text-sm">' +
    '<thead><tr class="bg-white/[0.03] to-mono text-xs text-zinc-500 border-b border-white/10">' +
    ["Vehicle", "Distance", "Fuel Efficiency", "Operational Cost", "Revenue", "ROI"].map(h => '<th class="text-left px-4 py-2 font-medium">' + h + '</th>').join("") +
    '</tr></thead><tbody>' + rows + '</tbody></table></div>' +
    '<div class="glass-card bg-zinc-900/60 backdrop-blur-xl border border-white/10 rounded-2xl p-4"><h3 class="to-display text-sm font-semibold text-white mb-3">Operational cost by vehicle</h3><div class="flex gap-4">' + bars + '</div></div>';
}

// ===========================================================================
// SHELL / RENDER
// ===========================================================================
function shellTemplate() {
  const navHtml = NAV.map(n => '<button onclick="setTab(\'' + n.key + '\')" class="w-[calc(100%-16px)] mx-2 flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-sm text-left transition-all duration-150 ' +
    (state.tab === n.key ? "bg-blue-500/15 text-white shadow-[0_0_0_1px_rgba(10,132,255,0.3)_inset]" : "text-zinc-400 hover:bg-white/[0.05] hover:text-white") + '">' +
    '<span class="' + (state.tab === n.key ? "opacity-100 text-blue-400" : "opacity-70") + '">' + icon(n.icon, "w-[18px] h-[18px]") + '</span> ' + n.label + '</button>').join("");

  let content = "";
  if (state.tab === "dashboard") content = dashboardTemplate();
  else if (state.tab === "vehicles") content = vehiclesTemplate();
  else if (state.tab === "drivers") content = driversTemplate();
  else if (state.tab === "trips") content = tripsTemplate();
  else if (state.tab === "maintenance") content = maintenanceTemplate();
  else if (state.tab === "fuel") content = fuelTemplate();
  else if (state.tab === "reports") content = reportsTemplate();

  let modalHtml = "";
  if (state.modal === "addVehicle") modalHtml = addVehicleModal();
  else if (state.modal === "addDriver") modalHtml = addDriverModal();
  else if (state.modal === "addTrip") modalHtml = addTripModal();
  else if (state.modal === "completeTrip") modalHtml = completeTripModal();
  else if (state.modal === "addMaintenance") modalHtml = addMaintenanceModal();
  else if (state.modal === "addFuel") modalHtml = addFuelModal();
  else if (state.modal === "addExpense") modalHtml = addExpenseModal();

  return '<div class="min-h-screen flex">' +
    '<aside class="w-64 bg-zinc-950/70 backdrop-blur-2xl border-r border-white/10 text-zinc-300 flex flex-col shrink-0 min-h-screen">' +
      '<div class="px-5 py-6 flex items-center gap-2.5">' +
        '<div class="w-8 h-8 rounded-xl bg-gradient-to-br from-blue-400 to-blue-600 flex items-center justify-center shadow-[0_4px_12px_rgba(10,132,255,0.35)]">' + icon("route", "w-4 h-4 text-white") + '</div>' +
        '<span class="to-display font-bold text-white tracking-tight text-[15px]">TransitOps</span></div>' +
      '<nav class="flex-1 px-0 space-y-0.5">' + navHtml + '</nav>' +
      '<div class="mx-3 mb-4 p-3.5 rounded-2xl bg-white/[0.04] border border-white/10">' +
        '<div class="flex items-center gap-2.5 mb-3">' +
        '<span class="w-8 h-8 rounded-lg bg-blue-500/15 text-blue-400 flex items-center justify-center shrink-0">' + icon(ROLE_ICON[state.user.role], "w-4 h-4") + '</span>' +
        '<div class="leading-tight overflow-hidden min-w-0"><div class="to-mono text-xs text-white truncate">' + esc(state.user.email) + '</div>' +
        '<div class="to-mono text-[10px] text-zinc-500 truncate">' + state.user.role + '</div></div></div>' +
        '<button onclick="signOut()" class="w-full flex items-center gap-1.5 text-xs text-zinc-500 hover:text-white transition-colors">' + icon("log-out", "w-3.5 h-3.5") + 'Sign out</button>' +
      '</div>' +
    '</aside>' +
    '<main class="flex-1 p-8 overflow-y-auto max-h-screen">' + toastTemplate() + '<div class="content-fade">' + content + '</div></main>' +
    modalHtml +
  '</div>';
}

function render() {
  document.getElementById("root").innerHTML = state.user ? shellTemplate() : loginTemplate();
}

render();
</script>
</body>
</html>
