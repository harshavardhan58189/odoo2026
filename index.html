<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TransitOps — Smart Transport Operations Platform</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  body { font-family: 'IBM Plex Sans', sans-serif; }
  .to-display { font-family: 'Space Grotesk', sans-serif; }
  .to-mono { font-family: 'IBM Plex Mono', monospace; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  .modal-backdrop { background: rgba(15,23,42,0.45); }
  input[type=date]::-webkit-calendar-picker-indicator { cursor: pointer; }
</style>
</head>
<body class="bg-stone-50">
<div id="root"></div>

<script>
// ===========================================================================
// TransitOps — self-contained vanilla JS build (no bundler / no framework)
// ===========================================================================

const TODAY = new Date();

const ROLES = ["Fleet Manager", "Driver", "Safety Officer", "Financial Analyst"];
const ROLE_EMOJI = { "Fleet Manager": "🚚", "Driver": "🛣️", "Safety Officer": "🛡️", "Financial Analyst": "📊" };

// The real permission matrix now lives server-side (auth.js) and is enforced
// on every write route. This copy is only used to shape the UI (show/hide
// buttons) before the first API call resolves; state.permissions (fetched
// from /api/auth/login and /api/bootstrap) is the source of truth once set.
const PERMS = {
  "Fleet Manager":     { vehicles: "write", drivers: "read",  trips: "read",  maintenance: "write", fuel: "read",  reports: "read"  },
  "Driver":            { vehicles: "read",  drivers: "read",  trips: "write", maintenance: "read",  fuel: "write", reports: "read"  },
  "Safety Officer":    { vehicles: "read",  drivers: "write", trips: "read",  maintenance: "read",  fuel: "read",  reports: "read"  },
  "Financial Analyst": { vehicles: "read",  drivers: "read",  trips: "read",  maintenance: "read",  fuel: "write", reports: "write" },
};

// ===========================================================================
// API layer
// ===========================================================================
const API_BASE = ""; // same-origin: server.js serves this file and /api/*

async function api(path, opts) {
  opts = opts || {};
  const headers = Object.assign({}, opts.headers || {});
  if (opts.body) headers["Content-Type"] = "application/json";
  if (state.token) headers["Authorization"] = "Bearer " + state.token;
  const res = await fetch(API_BASE + path, {
    method: opts.method || "GET",
    headers,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  let data = null;
  try { data = await res.json(); } catch (e) { /* non-JSON (e.g. CSV) handled by caller */ }
  if (!res.ok) throw new Error((data && data.error) || (res.status + " " + res.statusText));
  return data;
}

async function loadCollections() {
  const boot = await api("/api/bootstrap");
  state.permissions = boot.permissions;
  state.vehicles = boot.vehicles;
  state.drivers = boot.drivers;
  state.trips = boot.trips;
  state.maintenance = boot.maintenance;
  state.fuelLogs = boot.fuelLogs;
  state.expenses = boot.expenses;
}

async function refresh(fn) {
  // Run a mutation, reload all collections from the server so every panel
  // reflects the authoritative state, then re-render. On failure, surface
  // the server's error message via the existing toast system.
  try {
    await fn();
    await loadCollections();
    render();
  } catch (err) {
    notify(err.message || "Something went wrong", "err");
    render();
  }
}

const NAV = [
  { key: "dashboard",   label: "Dashboard",        icon: "🧭", area: null },
  { key: "vehicles",    label: "Vehicles",         icon: "🚚", area: "vehicles" },
  { key: "drivers",     label: "Drivers",          icon: "👥", area: "drivers" },
  { key: "trips",       label: "Trips",            icon: "🛣️", area: "trips" },
  { key: "maintenance", label: "Maintenance",      icon: "🔧", area: "maintenance" },
  { key: "fuel",        label: "Fuel & Expenses",  icon: "⛽", area: "fuel" },
  { key: "reports",     label: "Reports",          icon: "📊", area: "reports" },
];

const STATUS_COLORS = {
  Available: "bg-emerald-50 text-emerald-700 border-emerald-200",
  "On Trip": "bg-amber-50 text-amber-700 border-amber-200",
  "In Shop": "bg-amber-50 text-amber-700 border-amber-200",
  Retired: "bg-slate-100 text-slate-500 border-slate-200",
  "Off Duty": "bg-slate-100 text-slate-500 border-slate-200",
  Suspended: "bg-red-50 text-red-700 border-red-200",
  Draft: "bg-slate-100 text-slate-600 border-slate-200",
  Dispatched: "bg-amber-50 text-amber-700 border-amber-200",
  Completed: "bg-emerald-50 text-emerald-700 border-emerald-200",
  Cancelled: "bg-red-50 text-red-700 border-red-200",
  Open: "bg-amber-50 text-amber-700 border-amber-200",
  Closed: "bg-emerald-50 text-emerald-700 border-emerald-200",
};

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
const state = {
  user: null,
  token: localStorage.getItem("transitops_token") || null,
  permissions: null, // set from the server on login/bootstrap — authoritative
  loginRole: "Fleet Manager",
  loginError: "",
  tab: "dashboard",
  modal: null, // string key
  completingTripId: null,
  toast: null,
  loading: false,
  dashFilters: { type: "All", status: "All", region: "All" },
  vehicleSearch: "",

  // These collections are now populated from the backend (GET /api/bootstrap)
  // rather than hardcoded here — see loadCollections().
  vehicles: [],
  drivers: [],
  trips: [],
  maintenance: [],
  fuelLogs: [],
  expenses: [],
};

let toastTimer = null;
function notify(msg, kind) {
  state.toast = { msg, kind: kind || "ok" };
  render();
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { state.toast = null; render(); }, 3000);
}

function uid(prefix, arr) {
  return prefix + "-" + String(arr.length + 1).padStart(2, "0") + "-" + Math.floor(Math.random() * 900 + 100);
}
function vehicleById(id) { return state.vehicles.find(v => v.id === id); }
function driverById(id) { return state.drivers.find(d => d.id === id); }
function money(n) { return "₹" + Number(n || 0).toLocaleString("en-IN"); }
function isLicenseExpired(d) { return new Date(d.expiry) < TODAY; }
function esc(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }
function val(id) { const el = document.getElementById(id); return el ? el.value : ""; }

// ===========================================================================
// AUTH
// ===========================================================================
function selectLoginRole(role) { state.loginRole = role; render(); }

async function submitLogin() {
  const email = val("login-email");
  const password = val("login-password");
  state.loginError = "";
  try {
    const { token, user } = await api("/api/auth/login", {
      method: "POST",
      body: { email, password, role: state.loginRole },
    });
    state.token = token;
    localStorage.setItem("transitops_token", token);
    state.user = user;
    state.tab = "dashboard";
    await loadCollections();
    render();
    notify("Signed in as " + state.user.role);
  } catch (err) {
    state.loginError = err.message;
    render();
  }
}

async function signOut() {
  try { await api("/api/auth/logout", { method: "POST" }); } catch (e) { /* ignore */ }
  state.user = null;
  state.token = null;
  state.permissions = null;
  localStorage.removeItem("transitops_token");
  render();
}

// Authoritative permissions come from the server (auth.js PERMS, enforced on
// every write route). Fall back to the client-side copy only for the brief
// window before the first API response lands.
function can(area) {
  if (!state.user) return false;
  const perms = state.permissions || PERMS[state.user.role];
  return perms[area] === "write";
}

// On page load, if a token is already stored, try to resume the session
// instead of forcing a fresh login.
async function resumeSession() {
  if (!state.token) return;
  try {
    const me = await api("/api/auth/me");
    state.user = me.user;
    state.permissions = me.permissions;
    await loadCollections();
  } catch (err) {
    // token expired/invalid (server restarted, etc.) — fall back to login
    state.token = null;
    localStorage.removeItem("transitops_token");
  }
}

// ===========================================================================
// NAV / MODAL
// ===========================================================================
function setTab(tab) { state.tab = tab; render(); }
function openModal(key) { state.modal = key; render(); }
function closeModal() { state.modal = null; state.completingTripId = null; render(); }

// ===========================================================================
// VEHICLE actions
// ===========================================================================
function submitVehicleForm() {
  const reg = val("v-reg").trim(), name = val("v-name").trim();
  const type = val("v-type"), region = val("v-region");
  const maxLoad = Number(val("v-maxload")), odometer = Number(val("v-odo")) || 0, cost = Number(val("v-cost"));
  if (!reg || !name || !maxLoad || !cost) { notify("Please fill in all required fields", "err"); return; }
  refresh(async () => {
    await api("/api/vehicles", { method: "POST", body: { reg, name, type, region, maxLoad, odometer, cost } });
    notify("Vehicle registered");
    closeModal();
  });
}
function retireVehicle(id) {
  refresh(async () => {
    await api("/api/vehicles/" + id + "/retire", { method: "PATCH" });
    notify("Vehicle retired");
  });
}

// ===========================================================================
// DRIVER actions
// ===========================================================================
function submitDriverForm() {
  const name = val("d-name").trim(), license = val("d-license").trim();
  const category = val("d-category"), expiry = val("d-expiry"), contact = val("d-contact");
  const safety = Number(val("d-safety")) || 0;
  if (!name || !license || !expiry) { notify("Please fill in all required fields", "err"); return; }
  refresh(async () => {
    await api("/api/drivers", { method: "POST", body: { name, license, category, expiry, contact, safety } });
    notify("Driver added");
    closeModal();
  });
}
function suspendDriver(id) {
  refresh(async () => {
    await api("/api/drivers/" + id + "/suspend", { method: "PATCH" });
    notify("Driver suspended", "err");
  });
}
function reinstateDriver(id) {
  refresh(async () => {
    await api("/api/drivers/" + id + "/reinstate", { method: "PATCH" });
    notify("Driver reinstated");
  });
}

// ===========================================================================
// TRIP lifecycle
// ===========================================================================
function submitTripForm() {
  const source = val("t-source").trim(), destination = val("t-destination").trim();
  const vehicleId = val("t-vehicle"), driverId = val("t-driver");
  const cargo = Number(val("t-cargo")), distance = Number(val("t-distance")) || 0;
  if (!source || !destination || !vehicleId || !driverId || !cargo) { notify("Please fill in all required fields", "err"); return; }

  // Availability, license-expiry and max-load checks are re-validated
  // authoritatively by the server (business.js createTrip) — the client no
  // longer has the final say.
  refresh(async () => {
    await api("/api/trips", { method: "POST", body: { source, destination, vehicleId, driverId, cargo, distance } });
    notify("Trip created as Draft");
    closeModal();
  });
}

function dispatchTrip(id) {
  refresh(async () => {
    await api("/api/trips/" + id + "/dispatch", { method: "PATCH" });
    notify("Trip dispatched");
  });
}

function openCompleteModal(id) {
  state.completingTripId = id;
  state.modal = "completeTrip";
  render();
}

function submitCompleteTrip() {
  const id = state.completingTripId;
  const finalOdometer = Number(val("c-odo")), fuelUsed = Number(val("c-fuel")) || 0, revenue = Number(val("c-revenue")) || 0;
  refresh(async () => {
    await api("/api/trips/" + id + "/complete", { method: "PATCH", body: { finalOdometer, fuelUsed, revenue } });
    notify("Trip completed");
    closeModal();
  });
}

function cancelTrip(id) {
  refresh(async () => {
    await api("/api/trips/" + id + "/cancel", { method: "PATCH" });
    notify("Trip cancelled", "err");
  });
}

// ===========================================================================
// MAINTENANCE
// ===========================================================================
function submitMaintenanceForm() {
  const vehicleId = val("m-vehicle"), type = val("m-type"), cost = Number(val("m-cost")), date = val("m-date");
  if (!vehicleId || !cost) { notify("Please fill in all required fields", "err"); return; }
  refresh(async () => {
    await api("/api/maintenance", { method: "POST", body: { vehicleId, type, cost, date } });
    notify("Maintenance record opened — vehicle moved to In Shop");
    closeModal();
  });
}
function closeMaintenance(id) {
  refresh(async () => {
    await api("/api/maintenance/" + id + "/close", { method: "PATCH" });
    notify("Maintenance closed");
  });
}

// ===========================================================================
// FUEL / EXPENSE
// ===========================================================================
function submitFuelForm() {
  const vehicleId = val("f-vehicle"), liters = Number(val("f-liters")), cost = Number(val("f-cost")), date = val("f-date");
  if (!vehicleId || !liters) { notify("Please fill in all required fields", "err"); return; }
  refresh(async () => {
    await api("/api/fuel-logs", { method: "POST", body: { vehicleId, liters, cost, date } });
    notify("Fuel log recorded");
    closeModal();
  });
}
function submitExpenseForm() {
  const vehicleId = val("e-vehicle"), category = val("e-category"), amount = Number(val("e-amount")), date = val("e-date");
  if (!vehicleId || !amount) { notify("Please fill in all required fields", "err"); return; }
  refresh(async () => {
    await api("/api/expenses", { method: "POST", body: { vehicleId, category, amount, date } });
    notify("Expense recorded");
    closeModal();
  });
}

// ===========================================================================
// REPORTS + derived data
// ===========================================================================
function perVehicleReport() {
  return state.vehicles.map(v => {
    const vTrips = state.trips.filter(t => t.vehicleId === v.id && t.status === "Completed");
    const distance = vTrips.reduce((s, t) => s + (t.distance || 0), 0);
    const revenue = vTrips.reduce((s, t) => s + (t.revenue || 0), 0);
    const fuelL = state.fuelLogs.filter(f => f.vehicleId === v.id).reduce((s, f) => s + f.liters, 0);
    const fuelCost = state.fuelLogs.filter(f => f.vehicleId === v.id).reduce((s, f) => s + f.cost, 0);
    const maintCost = state.maintenance.filter(m => m.vehicleId === v.id).reduce((s, m) => s + m.cost, 0);
    const expCost = state.expenses.filter(e => e.vehicleId === v.id).reduce((s, e) => s + e.amount, 0);
    const opCost = fuelCost + maintCost + expCost;
    const efficiency = fuelL > 0 ? distance / fuelL : 0;
    const roi = v.cost > 0 ? (revenue - (maintCost + fuelCost)) / v.cost : 0;
    return Object.assign({}, v, { distance, revenue, fuelL, fuelCost, maintCost, expCost, opCost, efficiency, roi });
  });
}

function computeKpis() {
  const active = state.vehicles.filter(v => v.status !== "Retired");
  const available = state.vehicles.filter(v => v.status === "Available");
  const inShop = state.vehicles.filter(v => v.status === "In Shop");
  const onTrip = state.vehicles.filter(v => v.status === "On Trip");
  const activeTrips = state.trips.filter(t => t.status === "Dispatched").length;
  const pendingTrips = state.trips.filter(t => t.status === "Draft").length;
  const driversOnDuty = state.drivers.filter(d => d.status === "On Trip").length;
  const utilization = active.length ? Math.round((onTrip.length / active.length) * 100) : 0;
  return { active: active.length, available: available.length, inShop: inShop.length, activeTrips, pendingTrips, driversOnDuty, utilization };
}

async function exportCsv() {
  try {
    const res = await fetch(API_BASE + "/api/reports/export.csv", {
      headers: { Authorization: "Bearer " + state.token },
    });
    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || "Export failed"); }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "transitops_report.csv"; a.click();
    URL.revokeObjectURL(url);
  } catch (err) {
    notify(err.message || "Export failed", "err");
    render();
  }
}

function updateDashFilter(key, value) { state.dashFilters[key] = value; render(); }
function updateVehicleSearch(value) { state.vehicleSearch = value; render(); }

// ===========================================================================
// TEMPLATES
// ===========================================================================
function badge(status) {
  const cls = STATUS_COLORS[status] || "bg-slate-100 text-slate-600 border-slate-200";
  return '<span class="to-mono text-xs px-2 py-0.5 rounded-full border ' + cls + '">' + esc(status) + '</span>';
}

function field(label, inner) {
  return '<label class="block mb-3"><span class="text-xs font-medium text-slate-500 uppercase tracking-wide">' + esc(label) + '</span><div class="mt-1">' + inner + '</div></label>';
}
const inputCls = "w-full to-mono text-sm border border-slate-300 rounded-md px-2.5 py-1.5 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-amber-400";

function btn(label, onclick, variant) {
  const styles = {
    primary: "bg-slate-900 text-white hover:bg-slate-800",
    ghost: "bg-white text-slate-700 border border-slate-300 hover:bg-slate-50",
    danger: "bg-red-600 text-white hover:bg-red-700",
    amber: "bg-amber-500 text-white hover:bg-amber-600",
    emerald: "bg-emerald-600 text-white hover:bg-emerald-700",
  };
  return '<button onclick="' + onclick + '" class="text-sm font-medium px-3 py-1.5 rounded-md transition-colors ' + (styles[variant] || styles.primary) + '">' + label + '</button>';
}

function routeStrip(status) {
  const stops = ["Draft", "Dispatched", "Completed"];
  const cancelled = status === "Cancelled";
  const activeIdx = stops.indexOf(status);
  let html = '<div class="flex items-center gap-0 w-full">';
  stops.forEach((s, i) => {
    const reached = !cancelled && i <= activeIdx;
    html += '<div class="flex flex-col items-center gap-1">' +
      '<div class="w-2.5 h-2.5 rounded-full border-2 ' + (cancelled ? "border-red-300 bg-red-100" : reached ? "border-amber-500 bg-amber-500" : "border-slate-300 bg-white") + '"></div>' +
      '<span class="to-mono text-[10px] ' + (reached && !cancelled ? "text-amber-700" : "text-slate-400") + '">' + s + '</span></div>';
    if (i < stops.length - 1) {
      html += '<div class="flex-1 h-0.5 mb-4 ' + (cancelled ? "bg-red-200" : (reached && i < activeIdx ? "bg-amber-500" : "bg-slate-200")) + '"></div>';
    }
  });
  html += '</div>';
  if (cancelled) html += '<span class="to-mono text-[10px] text-red-500">cancelled en route</span>';
  return html;
}

function loginTemplate() {
  const roleCards = ROLES.map(r => {
    const active = state.loginRole === r;
    return '<button type="button" onclick="selectLoginRole(\'' + r + '\')" class="flex flex-col items-start gap-1.5 p-3 rounded-md border text-left transition-colors ' +
      (active ? "border-amber-500 bg-amber-50" : "border-slate-200 hover:border-slate-300") + '">' +
      '<span class="text-base">' + ROLE_EMOJI[r] + '</span>' +
      '<span class="text-xs font-medium text-slate-700 leading-tight">' + r + '</span></button>';
  }).join("");

  return '<div class="min-h-screen bg-slate-900 flex items-center justify-center p-4">' +
    '<div class="w-full max-w-md">' +
      '<div class="flex items-center gap-2 justify-center mb-6">' +
        '<div class="w-9 h-9 rounded bg-amber-500 flex items-center justify-center text-lg">🛣️</div>' +
        '<span class="to-display text-2xl font-semibold text-white">TransitOps</span>' +
      '</div>' +
      '<div class="bg-white border border-slate-200 rounded-lg p-6">' +
        '<h1 class="to-display text-lg font-semibold text-slate-900 mb-1">Sign in</h1>' +
        '<p class="text-sm text-slate-500 mb-4">Smart Transport Operations Platform</p>' +
        '<div class="grid grid-cols-2 gap-2 mb-4">' + roleCards + '</div>' +
        field("Email", '<input id="login-email" class="' + inputCls + '" placeholder="you@transitops.com" />') +
        field("Password", '<input id="login-password" type="password" class="' + inputCls + '" placeholder="••••••••" />') +
        (state.loginError ? '<p class="text-xs text-red-600 mb-3">' + esc(state.loginError) + '</p>' : '') +
        '<button onclick="submitLogin()" class="w-full flex items-center justify-center gap-1.5 text-sm font-medium px-3 py-2 rounded-md bg-slate-900 text-white hover:bg-slate-800">Sign in as ' + state.loginRole + ' →</button>' +
      '</div>' +
      '<p class="text-center text-xs text-slate-400 mt-4">Demo login — any email/password (4+ chars) is accepted. Role controls what you can edit.</p>' +
    '</div>' +
  '</div>';
}

function toastTemplate() {
  if (!state.toast) return "";
  const err = state.toast.kind === "err";
  return '<div class="fixed top-4 right-4 z-50 text-sm px-4 py-2 rounded-md shadow-lg border ' +
    (err ? "bg-red-50 border-red-200 text-red-700" : "bg-emerald-50 border-emerald-200 text-emerald-700") + '">' + esc(state.toast.msg) + '</div>';
}

function sectionHeader(title, subtitle, actionHtml) {
  return '<div class="flex items-end justify-between mb-4">' +
    '<div><h2 class="to-display text-xl font-semibold text-slate-900">' + title + '</h2>' +
    (subtitle ? '<p class="text-sm text-slate-500 mt-0.5">' + subtitle + '</p>' : '') + '</div>' +
    (actionHtml || '') + '</div>';
}

function modalWrap(title, bodyHtml) {
  return '<div class="fixed inset-0 modal-backdrop flex items-center justify-center z-50 p-4" onclick="if(event.target===this)closeModal()">' +
    '<div class="bg-white border border-slate-200 rounded-lg w-full max-w-lg max-h-[85vh] overflow-y-auto shadow-xl" onclick="event.stopPropagation()">' +
    '<div class="flex items-center justify-between px-5 py-3 border-b border-slate-200">' +
    '<h3 class="to-display font-semibold text-slate-900">' + title + '</h3>' +
    '<button onclick="closeModal()" class="text-slate-400 hover:text-slate-700 text-lg leading-none">✕</button></div>' +
    '<div class="p-5">' + bodyHtml + '</div></div></div>';
}

// ---- Dashboard ----
function dashboardTemplate() {
  const kpis = computeKpis();
  const cards = [
    ["Active Vehicles", kpis.active, "🚚"], ["Available Vehicles", kpis.available, "✅"],
    ["Vehicles in Maintenance", kpis.inShop, "🔧"], ["Active Trips", kpis.activeTrips, "🛣️"],
    ["Pending Trips", kpis.pendingTrips, "📍"], ["Drivers On Duty", kpis.driversOnDuty, "👥"],
    ["Fleet Utilization", kpis.utilization + "%", "📈"],
  ];
  const cardsHtml = cards.map(c => '<div class="bg-white border border-slate-200 rounded-lg p-4">' +
    '<div class="text-base mb-2">' + c[2] + '</div>' +
    '<div class="to-display text-2xl font-semibold text-slate-900">' + c[1] + '</div>' +
    '<div class="text-xs text-slate-500 mt-0.5">' + c[0] + '</div></div>').join("");

  const byType = {};
  state.vehicles.forEach(v => {
    byType[v.type] = byType[v.type] || { total: 0, onTrip: 0 };
    byType[v.type].total++;
    if (v.status === "On Trip") byType[v.type].onTrip++;
  });
  const maxUtil = 100;
  const barsHtml = Object.keys(byType).map(type => {
    const r = byType[type];
    const pct = r.total ? Math.round((r.onTrip / r.total) * 100) : 0;
    return '<div class="flex flex-col items-center gap-1.5 flex-1">' +
      '<div class="to-mono text-xs text-slate-500">' + pct + '%</div>' +
      '<div class="w-full bg-slate-100 rounded-t h-40 flex items-end"><div class="w-full bg-amber-500 rounded-t" style="height:' + Math.max(pct, 3) + '%"></div></div>' +
      '<div class="to-mono text-xs text-slate-600">' + type + '</div></div>';
  }).join("");

  const f = state.dashFilters;
  const types = ["All"].concat([...new Set(state.vehicles.map(v => v.type))]);
  const statuses = ["All", "Available", "On Trip", "In Shop", "Retired"];
  const regions = ["All"].concat([...new Set(state.vehicles.map(v => v.region))]);
  const filtered = state.vehicles.filter(v =>
    (f.type === "All" || v.type === f.type) && (f.status === "All" || v.status === f.status) && (f.region === "All" || v.region === f.region));

  const opt = (arr, current) => arr.map(x => '<option value="' + x + '"' + (x === current ? " selected" : "") + '>' + x + '</option>').join("");
  const filterList = filtered.map(v => '<div class="flex items-center justify-between to-mono text-xs"><span class="text-slate-700">' + v.name + '</span>' + badge(v.status) + '</div>').join("")
    || '<p class="text-xs text-slate-400">No vehicles match these filters.</p>';

  return sectionHeader("Dashboard", "Live operational snapshot across the fleet") +
    '<div class="grid grid-cols-4 gap-3 mb-6">' + cardsHtml + '</div>' +
    '<div class="grid grid-cols-3 gap-6">' +
      '<div class="bg-white border border-slate-200 rounded-lg p-4 col-span-2">' +
        '<h3 class="to-display text-sm font-semibold text-slate-900 mb-3">Utilization by vehicle type</h3>' +
        '<div class="flex gap-4">' + barsHtml + '</div>' +
      '</div>' +
      '<div class="bg-white border border-slate-200 rounded-lg p-4">' +
        '<h3 class="to-display text-sm font-semibold text-slate-900 mb-3">Filter fleet</h3>' +
        field("Type", '<select class="' + inputCls + '" onchange="updateDashFilter(\'type\', this.value)">' + opt(types, f.type) + '</select>') +
        field("Status", '<select class="' + inputCls + '" onchange="updateDashFilter(\'status\', this.value)">' + opt(statuses, f.status) + '</select>') +
        field("Region", '<select class="' + inputCls + '" onchange="updateDashFilter(\'region\', this.value)">' + opt(regions, f.region) + '</select>') +
        '<div class="mt-3 space-y-1.5 max-h-40 overflow-y-auto">' + filterList + '</div>' +
      '</div>' +
    '</div>';
}

  else if (state.tab === "trips") content = tripsTemplate();
  else if (state.tab === "maintenance") content = maintenanceTemplate();
  else if (state.tab === "fuel") content = fuelTemplate();

  let modalHtml = "";
  if (state.modal === "addVehicle") modalHtml = addVehicleModal();
  else if (state.modal === "addDriver") modalHtml = addDriverModal();
  else if (state.modal === "addTrip") modalHtml = addTripModal();
  else if (state.modal === "completeTrip") modalHtml = completeTripModal();
  else if (state.modal === "addMaintenance") modalHtml = addMaintenanceModal();
  else if (state.modal === "addFuel") modalHtml = addFuelModal();
  else if (state.modal === "addExpense") modalHtml = addExpenseModal();

  return '<div class="min-h-screen bg-stone-50 flex">' +
    '<aside class="w-56 bg-slate-900 text-slate-300 flex flex-col shrink-0 min-h-screen">' +
      '<div class="px-4 py-5 border-b border-slate-800 flex items-center gap-2">' +
        '<div class="w-7 h-7 rounded bg-amber-500 flex items-center justify-center">🛣️</div>' +
        '<span class="to-display font-semibold text-white tracking-tight">TransitOps</span></div>' +
      '<nav class="flex-1 py-3">' + navHtml + '</nav>' +
      '<div class="px-4 py-3 border-t border-slate-800">' +
        '<div class="flex items-center gap-2 mb-2"><span>' + ROLE_EMOJI[state.user.role] + '</span>' +
        '<div class="leading-tight"><div class="to-mono text-xs text-white">' + esc(state.user.email) + '</div>' +
        '<div class="to-mono text-[10px] text-slate-400">' + state.user.role + '</div></div></div>' +
        '<button onclick="signOut()" class="flex items-center gap-1.5 text-xs text-slate-400 hover:text-white">⎋ Sign out</button>' +
      '</div>' +
    '</aside>' +
    '<main class="flex-1 p-6 overflow-y-auto max-h-screen">' + toastTemplate() + content + '</main>' +
    modalHtml +
  '</div>';
}

function render() {
  document.getElementById("root").innerHTML = state.user ? shellTemplate() : loginTemplate();
}

(async function init() {
  render(); // show something immediately
  await resumeSession();
  render();
})();
</script>
</body>
</html>
